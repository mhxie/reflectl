# Runtime capability registry.
#
# Capability names are referenced by shared protocols (`protocols/*.md`,
# `AGENTS.md`); this file maps each one to the Codex-side tool that implements
# it. The Claude Code mapping is authoritative in `.claude/agents/*.md` `tools:`
# frontmatter, which Claude Code reads natively, so it is not duplicated here.

[capabilities.read_file]
description = "Read local project, protocol, and vault files."
codex = ["local file read"]

[capabilities.search_text]
description = "Search local files with path scoping."
codex = ["rg", "rg --files"]

[capabilities.run_shell]
description = "Run deterministic project scripts and shell commands."
codex = ["shell"]

[capabilities.semantic_query]
description = "Run conceptual local search over the user's Zettelkasten vault at $OV/."
codex = ["shell: uv run scripts/semantic.py query"]

[capabilities.web_search]
description = "Search the web for external context."
codex = ["web search when enabled"]

[capabilities.web_fetch]
description = "Fetch and read external pages."
codex = ["web fetch or browser when enabled"]

[capabilities.write_local_file]
description = "Write local files under $OV/ or the repo (reflections, cache, harness, drafts)."
codex = ["apply_patch", "local file edit"]

[capabilities.spawn_role]
description = "Delegate a role to a subagent or emulate it sequentially."
codex = ["Codex subagent when permitted", "sequential emulation"]

[capabilities.ask_user]
description = "Ask the user to choose among workflow branches."
codex = ["plain question", "numbered options"]
