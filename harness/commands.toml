# Portable command registry.
#
# Claude Code uses `.claude/commands/*.md` as native slash-command specs.
# Codex uses this manifest plus `scripts/reflectl.py prompt <command>` to
# discover the same workflows without depending on undocumented custom slash
# command behavior.

[commands.reflect]
source = ".claude/commands/reflect.md"
category = "session"
status = "portable-adapted"
description = "Primary menu for reflection, planning, action, reading, and learning sessions."
codex_prompt = "Run the /reflect workflow using `.claude/commands/reflect.md` and the runtime adapter protocol."

