# Portable agent registry.
#
# Claude Code uses `.claude/agents/*.md` as native subagent specs.
# Codex uses this registry plus `scripts/reflectl.py agents` and
# `scripts/reflectl.py agent-prompt <agent>` to discover and emulate roles.

[agents.challenger]
source = ".claude/agents/challenger.md"
model_profile = "reflective_challenge"
capability_profile = "challenger"
status = "portable-adapted"
description = "Presents probing questions to affirm or challenge the user's latest thoughts and feelings."
codex_prompt = "Emulate the Challenger role using `.claude/agents/challenger.md` and the runtime adapter protocol."

[agents.curator]
source = ".claude/agents/curator.md"
model_profile = "note_operations"
capability_profile = "curator"
status = "portable-adapted"
description = "Manages note operations: compacting, merging, replacing, and creating notes in Reflect."
codex_prompt = "Emulate the Curator role using `.claude/agents/curator.md` and the runtime adapter protocol."

